name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build + Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Verify formatting (Spotless)
        run: mvn -B spotless:check
        continue-on-error: true   # informational for now; flip to false once baselined

      - name: Compile
        run: mvn -B -pl shared/events,services/ingestion-api -am compile

      - name: Unit tests
        run: mvn -B -pl shared/events,services/ingestion-api -am test

      - name: Integration tests (Testcontainers)
        run: mvn -B -pl services/ingestion-api verify -DskipUnitTests=false

      - name: Upload JaCoCo coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage
          path: services/*/target/site/jacoco/

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-reports
          path: services/*/target/surefire-reports/

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ingestion-api image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/ingestion-api/Dockerfile
          push: false
          tags: fraud-platform/ingestion-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
